<div class="container section">
  <h2 class="mb-4">🧺 Carrito de Compras</h2>

  <!-- Carrito vacío -->
  <div class="empty-state" *ngIf="cartItems.length === 0">
    <i>🛒</i>
    <h3>Tu carrito está vacío</h3>
    <p>Agregá productos desde el catálogo.</p>
    <a routerLink="/shop" class="btn btn-primary mt-2">Ir al catálogo</a>
  </div>

  <!-- Items del carrito -->
  <div *ngIf="cartItems.length > 0">
    <div class="cart-item" *ngFor="let item of cartItems">
      <div class="d-flex align-items-center gap-3">
        <img [src]="item.product.image" [alt]="item.product.name"
             style="width: 64px; height: 64px; object-fit: cover; border-radius: 8px;">
        <div>
          <p class="mb-0 fw-500">{{ item.product.name }}</p>
          <small>${{ item.product.price | number }} c/u</small>
        </div>
      </div>

      <div class="d-flex align-items-center gap-3">
        <!-- Control cantidad -->
        <div class="d-flex align-items-center gap-2">
          <button class="btn btn-outline-secondary btn-sm px-2 py-0"
                  (click)="decrease(item.product.id)">−</button>
          <span class="fw-bold">{{ item.quantity }}</span>
          <button class="btn btn-outline-secondary btn-sm px-2 py-0"
                  (click)="increase(item.product.id)">+</button>
        </div>

        <!-- Subtotal -->
        <span class="fw-bold" style="min-width: 90px; text-align: right;">
          ${{ item.product.price * item.quantity | number }}
        </span>

        <!-- Eliminar -->
        <button class="btn btn-danger btn-sm" (click)="remove(item.product.id)">✕</button>
      </div>
    </div>

    <!-- Total -->
    <div class="d-flex justify-content-between align-items-center mt-4 pt-3"
         style="border-top: 2px solid #eee;">
      <span class="h5 mb-0">Total</span>
      <span class="cart-total">${{ total | number }}</span>
    </div>

    <!-- Botones -->
    <div class="d-flex gap-3 mt-4">
      <button class="btn btn-outline-secondary flex-grow-1" (click)="clearCart()">
        Vaciar carrito
      </button>
      <a routerLink="/checkout" class="btn btn-primary flex-grow-1">
        Finalizar compra →
      </a>
    </div>
  </div>
</div>
