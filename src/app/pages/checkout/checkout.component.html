<div class="container mt-4">
  <div class="row" *ngIf="!orderPlaced">
    <div class="col-md-7">
      <div class="card p-4">
        <h4>Datos de Facturación (ARCA)</h4>
        <form (ngSubmit)="onSubmit()" #checkoutForm="ngForm">
          <div class="mb-3">
            <label>Nombre Completo</label>
            <input type="text" class="form-control" [(ngModel)]="formData.name" name="name" required>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label>Tipo de Documento</label>
              <select class="form-select" [(ngModel)]="formData.doc_tipo" name="doc_tipo">
                <option value="96">DNI</option>
                <option value="80">CUIT</option>
                <option value="86">CUIL</option>
              </select>
            </div>
            <div class="col-md-6 mb-3">
              <label>Número de Doc/CUIT</label>
              <input type="text" class="form-control" [(ngModel)]="formData.doc_nro" name="doc_nro" placeholder="Sin guiones" required>
            </div>
          </div>

          <div class="mb-3">
            <label>Condición frente al IVA</label>
            <select class="form-select" [(ngModel)]="formData.condicion_iva" name="condicion_iva">
              <option value="CF">Consumidor Final</option>
              <option value="RI">Responsable Inscripto</option>
              <option value="MO">Monotributista</option>
            </select>
          </div>

          <button type="submit" class="btn btn-success w-100 mt-3" [disabled]="!checkoutForm.valid || loading">
            {{ loading ? 'Procesando con ARCA...' : 'Confirmar y Pagar' }}
          </button>
        </form>
      </div>
    </div>

    <div class="col-md-5">
      <div class="card p-4 bg-light">
        <h4>Resumen</h4>
        <ul class="list-group mb-3">
          <li *ngFor="let item of cartItems" class="list-group-item d-flex justify-content-between">
            <span>{{ item.name }} (x{{ item.quantity }})</span>
            <strong>${{ item.price * item.quantity }}</strong>
          </li>
          <li class="list-group-item d-flex justify-content-between bg-dark text-white">
            <span>Total</span>
            <strong>${{ total }}</strong>
          </li>
        </ul>
      </div>
    </div>
  </div>

  <div class="alert alert-success text-center p-5" *ngIf="orderPlaced">
    <span style="font-size: 50px;">📄</span>
    <h2>¡Compra Exitosa!</h2>
    <p>Tu factura ha sido autorizada por ARCA.</p>
    <div class="border p-3 bg-white d-inline-block">
      <strong>CAE: {{ caeNumber }}</strong><br>
      <small class="text-muted">Comprobante electrónico válido</small>
    </div>
    <br>
    <a routerLink="/" class="btn btn-primary mt-4">Volver a la tienda</a>
  </div>
</div>
