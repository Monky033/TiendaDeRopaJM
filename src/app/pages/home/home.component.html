<!-- Hero Section -->
<section class="hero">
  <div class="container">
    <h1>Nueva Colección 2025</h1>
    <p>Moda urbana, calidad premium. Encontrá tu estilo.</p>
    <a routerLink="/shop" class="btn btn-primary btn-lg">
      Ver colección →
    </a>
  </div>
</section>

<!-- Productos Destacados -->
<section class="section">
  <div class="container">
    <h2 class="mb-4">Productos Destacados</h2>
    <div class="row g-4">
      <div class="col-12 col-sm-6 col-lg-4" *ngFor="let product of featuredProducts">
        <div class="card product-card h-100">
          <img [src]="product.image" [alt]="product.name">
          <div class="card-body d-flex flex-column">
            <small class="text-muted mb-1">{{ product.category }}</small>
            <h3 class="card-title">{{ product.name }}</h3>
            <p class="fw-bold mt-auto mb-2" style="color: var(--primary); font-size: 18px;">
              ${{ product.price | number }}
            </p>
            <div class="d-flex gap-2">
              <a [routerLink]="['/product', product.id]" class="btn btn-outline-secondary btn-sm flex-grow-1">
                Ver detalle
              </a>
              <button class="btn btn-primary btn-sm flex-grow-1" (click)="addToCart(product)">
                + Carrito
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="text-center mt-4">
      <a routerLink="/shop" class="btn btn-outline-secondary px-4">Ver todos los productos</a>
    </div>
  </div>
</section>

<!-- Toast -->
<div class="toast-success" *ngIf="showToast">
  ✓ Producto agregado al carrito
</div>
